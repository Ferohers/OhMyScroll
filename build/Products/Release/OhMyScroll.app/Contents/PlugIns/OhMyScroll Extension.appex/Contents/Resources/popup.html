<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>OhMyScroll</title>
  <link rel="stylesheet" href="popup.css">
  <script src="popup.js" defer></script>
</head>
<body>
  <div class="popup">

    <!-- Header -->
    <header class="header">
      <div class="brand">
        <svg class="brand-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14"/>
          <path d="M19 12l-7 7-7-7"/>
        </svg>
        <span class="brand-name">OhMyScroll</span>
      </div>
      <label class="switch" id="enableSwitch">
        <input type="checkbox" id="enableToggle">
        <span class="switch-track">
          <span class="switch-knob"></span>
        </span>
      </label>
    </header>

    <!-- Auto Scroll -->
    <section class="card" id="autoScrollCard">
      <div class="card-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14"/>
          <path d="M19 12l-7 7-7-7"/>
        </svg>
        <span>Auto Scroll</span>
      </div>

      <div class="speed-row">
        <span class="speed-label">Speed</span>
        <span class="speed-badge" id="speedBadge">3×</span>
      </div>

      <div class="slider-wrap">
        <input type="range" id="speedSlider" min="1" max="10" value="3" step="1">
        <div class="slider-labels">
          <span>Slow</span>
          <span>Fast</span>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-outline" id="stopBtn" disabled>STOP</button>
        <button class="btn btn-filled" id="startBtn">START</button>
      </div>
    </section>

    <!-- Settings -->
    <section class="card">
      <div class="card-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span>Settings</span>
      </div>

      <label class="setting-row" id="middleClickRow">
        <span class="setting-text">Middle-click scroll</span>
        <label class="switch switch-sm">
          <input type="checkbox" id="middleClickToggle">
          <span class="switch-track">
            <span class="switch-knob"></span>
          </span>
        </label>
      </label>

      <div class="setting-row">
        <span class="setting-text">Cursor</span>
        <div class="pill-group" id="themePills">
          <button class="pill active" data-theme="white">White</button>
          <button class="pill" data-theme="yellow">Yellow</button>
        </div>
      </div>
    </section>

  </div>
</body>
</html>
