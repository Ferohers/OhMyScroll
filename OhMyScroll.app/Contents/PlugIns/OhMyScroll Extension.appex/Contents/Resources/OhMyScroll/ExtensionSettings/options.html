<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OhMyScroll Settings</title>
  <link rel="stylesheet" href="options.css">
  <script src="options.js" defer></script>
</head>
<body>
  <main class="settings">
    <h1>Cursor Hand</h1>
    <p class="subtitle">Choose which hand style appears during auto-scroll.</p>

    <fieldset class="theme-group">
      <legend>Hand Style</legend>

      <label class="theme-option">
        <input type="radio" name="cursor-theme" value="white">
        <img src="../ExtensionIcons/hand-white-48.png" width="24" height="24" alt="White hand preview">
        <span>White (Default)</span>
      </label>

      <label class="theme-option">
        <input type="radio" name="cursor-theme" value="yellow">
        <img src="../ExtensionIcons/hand-yellow-48.png" width="24" height="24" alt="Yellow hand preview">
        <span>Yellow</span>
      </label>
    </fieldset>

    <p id="status" class="status" aria-live="polite"></p>
  </main>
</body>
</html>
